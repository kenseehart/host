<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tesla OAuth — copy authorization code</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    code, pre { background: #f4f4f5; padding: 0.2em 0.4em; border-radius: 4px; word-break: break-all; }
    pre { padding: 1rem; overflow-x: auto; }
    .err { color: #b42318; }
    button { margin-top: 0.5rem; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Tesla authorization</h1>
  <div id="out">Loading…</div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const err = params.get("error");
    const out = document.getElementById("out");
    if (err) {
      out.innerHTML = `<p class="err"><strong>Error:</strong> ${err}<br>${params.get("error_description") || ""}</p>`;
    } else if (code) {
      out.innerHTML = `
        <p>Authorization succeeded. Copy the code below and paste it into your terminal
        (<code>python scripts/auth.py</code> prompt), or run:</p>
        <pre id="code">${code}</pre>
        <button type="button" onclick="navigator.clipboard.writeText(document.getElementById('code').textContent)">Copy code</button>
        <p>Codes expire quickly and are single-use.</p>`;
    } else {
      out.innerHTML = `<p class="err">No <code>code</code> in this URL. Start OAuth from <code>python scripts/auth.py</code>.</p>`;
    }
  </script>
</body>
</html>
