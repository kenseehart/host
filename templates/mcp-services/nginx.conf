# MCP gateway — nginx site config for mcp.seehart.com
# TLS certs: certbot --nginx -d mcp.seehart.com

limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name mcp.seehart.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.seehart.com;

    # certbot-managed TLS (mcp.seehart.com)
    ssl_certificate /etc/letsencrypt/live/mcp.seehart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.seehart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/mcp-access.log;
    error_log /var/log/nginx/mcp-error.log;

    # Claude OAuth discovery at domain root (resource_metadata in 401 responses)
    location /.well-known/oauth-protected-resource/host/ {
        proxy_pass http://127.0.0.1:8754/.well-known/oauth-protected-resource/host/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /.well-known/oauth-protected-resource/tesla/ {
        proxy_pass http://127.0.0.1:8752/.well-known/oauth-protected-resource/tesla/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /.well-known/oauth-protected-resource/fish/ {
        proxy_pass http://127.0.0.1:8753/.well-known/oauth-protected-resource/fish/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /.well-known/oauth-protected-resource/agent/ {
        proxy_pass http://127.0.0.1:8755/.well-known/oauth-protected-resource/agent/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /.well-known/oauth-protected-resource/nfnc/ {
        proxy_pass http://127.0.0.1:8756/.well-known/oauth-protected-resource/nfnc/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Claude OAuth discovery — issuer-suffixed paths at domain root
    location = /.well-known/oauth-authorization-server/host {
        proxy_pass http://127.0.0.1:8754/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/oauth-authorization-server/tesla {
        proxy_pass http://127.0.0.1:8752/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/oauth-authorization-server/fish {
        proxy_pass http://127.0.0.1:8753/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/oauth-authorization-server/agent {
        proxy_pass http://127.0.0.1:8755/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/oauth-authorization-server/nfnc {
        proxy_pass http://127.0.0.1:8756/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/openid-configuration/host {
        proxy_pass http://127.0.0.1:8754/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/openid-configuration/tesla {
        proxy_pass http://127.0.0.1:8752/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/openid-configuration/fish {
        proxy_pass http://127.0.0.1:8753/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/openid-configuration/agent {
        proxy_pass http://127.0.0.1:8755/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /.well-known/openid-configuration/nfnc {
        proxy_pass http://127.0.0.1:8756/.well-known/oauth-authorization-server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Claude OAuth browser redirect — hits /authorize at domain root (see access logs)
    location = /authorize {
        set $oauth_port 8754;
        if ($arg_resource ~* "/tesla/") { set $oauth_port 8752; }
        if ($arg_resource ~* "/fish/") { set $oauth_port 8753; }
        if ($arg_resource ~* "/agent/") { set $oauth_port 8755; }
        if ($arg_resource ~* "/nfnc/") { set $oauth_port 8756; }
        if ($arg_client_id = "tesla-mcp") { set $oauth_port 8752; }
        if ($arg_client_id = "fish-mcp") { set $oauth_port 8753; }
        if ($arg_client_id = "bridge-mcp") { set $oauth_port 8755; }
        if ($arg_client_id = "nfnc-mcp") { set $oauth_port 8756; }
        if ($arg_client_id = "host-mcp") { set $oauth_port 8754; }
        proxy_pass http://127.0.0.1:$oauth_port/authorize$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /token {
        set $oauth_port 8754;
        if ($arg_resource ~* "/tesla/") { set $oauth_port 8752; }
        if ($arg_resource ~* "/fish/") { set $oauth_port 8753; }
        if ($arg_resource ~* "/agent/") { set $oauth_port 8755; }
        if ($arg_resource ~* "/nfnc/") { set $oauth_port 8756; }
        proxy_pass http://127.0.0.1:$oauth_port/token$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- host (8754) ---
    location /host/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8754/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # Tesla Fleet API partner public key
    location = /.well-known/appspecific/com.tesla.3p.public-key.pem {
        alias /var/www/mcp-oauth/com.tesla.3p.public-key.pem;
        default_type application/x-pem-file;
    }

    # Tesla Fleet OAuth setup — show authorization code (one-time laptop auth)
    location = /tesla/callback {
        alias /var/www/mcp-oauth/tesla-callback.html;
        default_type text/html;
    }

    # --- tesla (8752) ---
    location /tesla/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8752/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- fish (8753) ---
    location /fish/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8753/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- bridge / agent (8755) ---
    location /agent/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8755/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- nfnc (8756) ---
    location /nfnc/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8756/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
