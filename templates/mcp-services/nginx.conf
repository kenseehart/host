# MCP gateway — nginx site config for mcp.seehart.com
# TLS certs: certbot --nginx -d mcp.seehart.com

limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name mcp.seehart.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.seehart.com;

    # certbot fills ssl_certificate paths
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/mcp-access.log;
    error_log /var/log/nginx/mcp-error.log;

    # --- host (8754) ---
    location /host/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8754/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- tesla (8752) ---
    location /tesla/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8752/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- fish (8753) ---
    location /fish/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8753/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- bridge / agent (8755) ---
    location /agent/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8755/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    # --- nfnc (8756) ---
    location /nfnc/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8756/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
