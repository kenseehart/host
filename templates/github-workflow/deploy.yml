name: Deploy {{SITE_NAME}}

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'host.yaml'
      - '.github/workflows/deploy-{{SITE_SLUG}}.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout host CLI
        uses: actions/checkout@v4
        with:
          repository: kenseehart/host
          path: host
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout host dependencies
        uses: actions/checkout@v4
        with:
          repository: kenseehart/shared
          path: shared
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: kenseehart/util
          path: util
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install host
        working-directory: host
        run: |
          uv sync
          uv run python -m util.mkdo_setup
          uv run mkdo host.sitehost -d .venv/bin

      - name: Verify deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST_SSH_HOST: ${{ secrets.HOST_SSH_HOST }}
          HOST_SSH_USER: ${{ secrets.HOST_SSH_USER }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$HOST_SSH_HOST" ] || [ -z "$HOST_SSH_USER" ]; then
            echo "::error::Missing GitHub secrets. Run: sitehost setup-deploy --ssh-user CPANEL_USER --apply-gh"
            exit 1
          fi

      - name: Configure SSH deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST_SSH_HOST: ${{ secrets.HOST_SSH_HOST }}
          HOST_SSH_USER: ${{ secrets.HOST_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        env:
          HOST_SSH_USER: ${{ secrets.HOST_SSH_USER }}
          HOST_SSH_HOST: ${{ secrets.HOST_SSH_HOST }}
          HOST_SSH_IDENTITY_FILE: ~/.ssh/deploy_key
        working-directory: host
        run: |
          uv run sitehost deploy --manifest "$GITHUB_WORKSPACE/host.yaml"
